theme:
  name: material
  language: de
  features:
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - navigation.tabs
    - navigation.path
    - search.suggest
    - search.highlight
    - toc.integrate
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: In dunklen Modus wechseln
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: In hellen Modus wechseln

plugins:
  - search:
      lang: de
      separator: '[\s\-]+'
  - git-revision-date
  - git-authors
  - minify:
      minify_html: true

extra:
  consent:
    title: Cookie-Zustimmung
    description: >-
      Wir verwenden Cookies, um Ihre Besuche und Präferenzen zu erkennen und die
      Effektivität unserer Dokumentation zu messen.

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji
  - attr_list
  - admonition
  - toc:
      permalink: true
      baselevel: 1
