site_name: Dokument 
nav:
  - Starseite: index.md
  - Server:
      - Postgresql: Server/Postgresql.md
      - Kachelserver:
          - Server20.04: Server/Kachelserver/Server204.md
          - Server22.04: Server/Kachelserver/Server224.md
          - Server24.04: Server/Kachelserver/Server244.md
      - Apache-Server mit Nginx verbinden: Server/Apache_Nginx.md
      - Nginx SSL Zertifikat: Server/Nginx_SSL.md
      - Nginx Einstellung: Server/nginx.md
      - Tomcat: Server/Tomcat.md
      - Weiter Software: Server/Software.md
  - IDE: IDE/index.md
  - Video:
      - Übersicht: Video/index.md
      - KI in der Film- und Videoproduktion: Video/ki-filmproduktion.md
  - Desktop Automation: Desktop_Automation/index.md
  - E-Learning-Autorentool: E-Learning-Autorentool/index.md
  - Audio: Audio/index.md
  - Android: IDE/Android.md
  - Dokument Erstellen:
      - Übersicht: Dokument_Erstellen/index.md
      - Mediawiki:
          - Installieren: Dokument_Erstellen/Mediawiki/index.md
          - Backup: Dokument_Erstellen/Mediawiki/Backup.md
          - Wiederherstellen: Dokument_Erstellen/Mediawiki/Wiederherstellen.md
      - Semantisches MediaWiki:
          - Installieren: Dokument_Erstellen/Semantisches_Mediawiki/Installieren.md
          - Kurzform: Dokument_Erstellen/Semantisches_Mediawiki/Kurzform.md
          - Erweiterungen: Dokument_Erstellen/Semantisches_Mediawiki/Wichtige_Erweiterungen.md
      - Xwiki:
          - Installieren: Dokument_Erstellen/Xwiki/Installieren.md
  - Tools:
      - Pandoc: Tools/Pandoc.md
      - Analysetool: Tools/Analysetool.md
      - Benchmark: Tools/Benchmark.md
  - Impressum: Impressum.md
  - Datenschutz: Datenschutz.md

theme:
  name: 'material'
  language: de
plugins:
  - search
extra:
  consent:
    title: Cookie-Zustimmung
    description: >-
      Wir verwenden Cookies, um Ihre Besuche und Präferenzen zu erkennen und die
      Effektivität unserer Dokumentation zu messen.

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format