theme:
  name: 'material'
  language: de
  features:
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - navigation.tabs
    - search.suggest
    - search.highlight
    - toc.integrate
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search:
      lang: de
      separator: '[\s\-]+'
      min_search_length: 3
      prebuild_index: true
  - git-revision-date
  - git-authors
  - minify:
      minify_html: true

extra:
  consent:
    title: Cookie-Zustimmung
    description: >-
      Wir verwenden Cookies, um Ihre Besuche und Präferenzen zu erkennen und die
      Effektivität unserer Dokumentation zu messen.

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji
  - attr_list
  - admonition
  - toc:
      permalink: true
      baselevel: 1
