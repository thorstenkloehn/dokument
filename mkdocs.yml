theme:
  name: material
  custom_dir: overrides
  language: de
  features:
    # Navigation
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.prune
    - navigation.footer
    # Suche
    - search.suggest
    - search.highlight
    - search.share
    # Content
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tooltips
    - content.tabs.link
    - content.action.view
    # TOC
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Dunklen Modus aktivieren
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: light-blue
      toggle:
        icon: material/weather-sunny
        name: Hellen Modus aktivieren
  icon:
    logo: material/book-open-page-variant
    repo: fontawesome/brands/github
    admonition:
      note:     material/pencil-circle
      abstract: material/clipboard-text
      info:     material/information
      tip:      material/fire
      success:  material/check-circle
      question: material/help-circle
      warning:  material/alert
      failure:  material/close-circle
      danger:   material/lightning-bolt-circle
      bug:      material/bug
      example:  material/test-tube
      quote:    material/format-quote-close
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search:
      lang: de
      separator: '[\s\-]+'
  - tags:
  - git-revision-date
  - git-authors
  - minify:
      minify_html: true

extra:
  consent:
    title: Cookie-Zustimmung
    description: >-
      Wir verwenden Cookies, um Ihre Besuche und Präferenzen zu erkennen und die
      Effektivität unserer Dokumentation zu messen.
    actions:
      - accept
      - reject
  social:
    - icon: fontawesome/solid/globe
      link: https://wissen-ahrensburg.de
      name: Wissen Ahrensburg
    - icon: fontawesome/brands/github
      link: https://github.com
      name: GitHub
  generator: true
  analytics:
    feedback:
      title: War diese Seite hilfreich?
      ratings:
        - icon: material/emoticon-happy-outline
          name: Diese Seite war hilfreich
          data: 1
          note: >-
            Danke für das Feedback!
        - icon: material/emoticon-sad-outline
          name: Diese Seite könnte besser sein
          data: 0
          note: >-
            Danke für das Feedback. Helfen Sie uns, diese Seite zu verbessern.

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - footnotes
  - toc:
      permalink: true
      baselevel: 1
